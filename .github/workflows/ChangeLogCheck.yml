# Enforces the update of the file Changelog.md on pull requests that change
# user-facing code. PRs that only touch CI, docs, tests or benchmarks do not
# need a changelog entry, so the enforcer is skipped for them (the job still
# runs and passes, so it stays safe as a required status check).
# Can also be skipped explicitly with the `Skip ChangeLog` label.
name: ChangeLog Update Check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      # Detect what kind of files this PR touches.
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            user_facing:
              - 'src/**'
              - 'ext/**'
              - 'Project.toml'
            changelog:
              - 'Changelog.md'

      # Require a changelog entry only when user-facing code changed.
      - uses: dangoslen/changelog-enforcer@v3
        if: ${{ steps.changes.outputs.user_facing == 'true' }}
        with:
          changeLogPath: 'Changelog.md'
          skipLabels: 'Skip ChangeLog'

      # Only validate formatting when Changelog.md itself was modified.
      - uses: actions/checkout@v7
        if: ${{ steps.changes.outputs.changelog == 'true' }}
      - uses: julia-actions/setup-julia@v3
        if: ${{ steps.changes.outputs.changelog == 'true' }}
        with:
          version: '1'
      - name: Install and Run Changelog
        if: ${{ steps.changes.outputs.changelog == 'true' }}
        run: |
          julia -e 'import Pkg; Pkg.add("Changelog")'
          julia -e 'using Changelog; Changelog.generate(Changelog.CommonMark(), "Changelog.md"; repo = "qojulia/SecondQuantizedAlgebra.jl")'

      - name: Changelog Format Check
        if: ${{ steps.changes.outputs.changelog == 'true' }}
        run: |
          julia -e '
            output = Cmd(`git diff --name-only`) |> read |> String
            if output == ""
                exit(0)
            else
                @error "The format of Changelog.md is not correct !!!"
                write(stdout, "Please format it by running the following command:\n")
                write(stdout, "make changelog")
                exit(1)
            end'
